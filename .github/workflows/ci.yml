name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-and-lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install Lua syntax checker
        run: sudo apt-get update && sudo apt-get install -y lua5.4
      - name: Rust formatting
        run: cargo fmt --all -- --check
      - name: Rust lint
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Rust tests
        run: cargo test --all-targets --locked
      - name: Lua syntax
        run: find mod/claude-interface -name '*.lua' -print0 | xargs -0 luac -p
      - name: Release build
        run: cargo build --release --all-targets --locked

  live-factorio:
    needs: rust-and-lua
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - name: Install live-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            coreutils curl findutils gawk grep iproute2 jq lua5.4 procps tar \
            util-linux xz-utils
      - name: Download official Factorio headless server
        env:
          FACTORIO_ARCHIVE: ${{ runner.temp }}/factorio-headless.tar.xz
        run: |
          curl --fail --location --retry 3 --retry-all-errors \
            https://www.factorio.com/get-download/stable/headless/linux64 \
            --output "$FACTORIO_ARCHIVE"
          tar -xJf "$FACTORIO_ARCHIVE" -C "${{ runner.temp }}"
          test -x "${{ runner.temp }}/factorio/bin/x64/factorio"
      - name: Complete live Factorio path
        env:
          FACTORIO_BIN: ${{ runner.temp }}/factorio/bin/x64/factorio
        run: just test-live
